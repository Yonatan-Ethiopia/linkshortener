<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invalid Link</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .card {
            text-align: center;
            padding: 2.5rem;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }
        h1 { 
            font-size: 1.8rem; 
            margin-bottom: 0.75rem; 
            color: #e11d48;
        }
        p { 
            color: #64748b; 
            font-size: 1rem; 
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Invalid Link</h1>
        <p>Link not supported or is invalid. Please check the URL and try again.</p>
    </div>
</body>
</html>
